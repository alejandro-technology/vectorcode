    { symbol = "verify_signature", file = "corpus_2/src/itsdangerous/signer.py", grade = 3 },
    { symbol = "get_signature", file = "corpus_2/src/itsdangerous/signer.py", grade = 3 },
    { symbol = "sign", file = "corpus_2/src/itsdangerous/signer.py", grade = 3 },
]

