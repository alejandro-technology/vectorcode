# Benchmark corpus configuration
# Defines the source repositories and file filters for each corpus.

[mini]
# Mini-corpus: 3 small, permissively-licensed repos
# Rust: error handling patterns
[[mini.repos]]
url = "https://github.com/dtolnay/thiserror"
sparse_paths = ["src"]
file_extensions = [".rs"]

# TypeScript: deep merge utility
[[mini.repos]]
url = "https://github.com/unjs/defu"
sparse_paths = ["src"]
file_extensions = [".ts"]

# Python: signing utility
[[mini.repos]]
url = "https://github.com/pallets/itsdangerous"
sparse_paths = ["src/itsdangerous"]
file_extensions = [".py"]

[vscode]
# VSCode editor source (sparse checkout for scale benchmark)
url = "https://github.com/microsoft/vscode.git"
sparse_paths = ["src/vs/editor/common", "src/vs/base/common", "src/vs/platform"]
file_extensions = [".ts"]
