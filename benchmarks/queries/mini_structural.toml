# Structural benchmark queries for mini corpus
# Each query has hand-labeled symbol expectations for graph-based retrieval.
# 5 callers, 4 imports, 3 dependents = 12 queries total
#
# Corpus: thiserror (Rust, corpus_0), defu (TypeScript, corpus_1), itsdangerous (Python, corpus_2)
# Graph data populated via tree-sitter extraction during indexing.

name = "mini-structural"

# === Callers (5 queries) ===

[[queries]]
text = "who calls unsign"
kind = "structural"
target_tool = "callers"
target_symbol = "unsign"
judgments = []
expected_symbols = [
    { symbol = "unsign", file = "corpus_2/src/itsdangerous/timed.py", grade = 3 },
    { symbol = "validate", file = "corpus_2/src/itsdangerous/timed.py", grade = 3 },
    { symbol = "loads", file = "corpus_2/src/itsdangerous/timed.py", grade = 3 },
    { symbol = "validate", file = "corpus_2/src/itsdangerous/signer.py", grade = 3 },
    { symbol = "loads", file = "corpus_2/src/itsdangerous/serializer.py", grade = 3 },
]

